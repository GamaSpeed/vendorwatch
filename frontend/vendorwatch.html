<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050507;--bg1:#0a0a0f;--bg2:#0f0f17;--bg3:#16161f;
  --border:#1e1e2e;--border2:#2a2a3e;
  --text:#e8e8f0;--text2:#9898b0;--text3:#5a5a78;
  --amber:#d4a840;--amber2:#f0c060;--amber3:rgba(212,168,64,.15);
  --red:#e05060;--red2:rgba(224,80,96,.15);
  --blue:#4090e0;--blue2:rgba(64,144,224,.15);
  --violet:#9060d0;--violet2:rgba(144,96,208,.15);
  --green:#30b070;--green2:rgba(48,176,112,.15);
  --orange:#d08030;--orange2:rgba(208,128,48,.15);
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.serif{font-family:'Fraunces',serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Layout */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;min-height:52px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.content{flex:1;overflow-y:auto;padding:28px 32px}
.rail{width:300px;min-width:300px;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* Sidebar */
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--amber),var(--orange));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#050507}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--amber3);color:var(--amber2);border:1px solid rgba(212,168,64,.2)}
.nav-icon{font-size:14px;width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border)}
.agent-dot{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:10px;font-family:'JetBrains Mono',monospace}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-amber{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.dot-blue{background:var(--blue)}
.dot-violet{background:var(--violet)}
.agent-name{color:var(--text2);width:90px}
.agent-status{color:var(--text3)}

/* Topbar */
.topbar-search{flex:1;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-size:13px;color:var(--text);font-family:'Syne',sans-serif;outline:none}
.topbar-search:focus{border-color:var(--border2)}
.topbar-search::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Syne',sans-serif;letter-spacing:.01em}
.btn-amber{background:var(--amber3);color:var(--amber2);border:1px solid rgba(212,168,64,.25)}
.btn-amber:hover{background:rgba(212,168,64,.25)}
.btn-ghost{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.live-badge{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--green);text-transform:uppercase;letter-spacing:.1em}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.8s ease-in-out infinite}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:18px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.kpi-label{font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.kpi-amber{color:var(--amber2)}
.kpi-red{color:var(--red)}
.kpi-green{color:var(--green)}
.kpi-blue{color:var(--blue)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.badge-critical{background:var(--red2);color:var(--red);border:1px solid rgba(224,80,96,.3)}
.badge-high{background:var(--orange2);color:var(--orange);border:1px solid rgba(208,128,48,.3)}
.badge-medium{background:var(--violet2);color:var(--violet);border:1px solid rgba(144,96,208,.3)}
.badge-lockin{background:var(--red2);color:#f080a0;border:1px solid rgba(240,128,160,.25)}
.badge-bigov{background:var(--violet2);color:#c090f0;border:1px solid rgba(192,144,240,.25)}
.badge-fiction{background:var(--amber3);color:var(--amber2);border:1px solid rgba(212,168,64,.25)}

/* Finding cards */
.finding-row{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.finding-row:hover{border-color:var(--border2);background:var(--bg3)}
.finding-title{font-size:14px;font-weight:600;margin:8px 0 4px;letter-spacing:-.01em}
.finding-evidence{font-size:12px;color:var(--text2);line-height:1.5}
.finding-meta{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3)}
.finding-amount{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--amber2)}

/* Console */
.console-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;max-height:320px;overflow-y:auto}
.log-line{display:flex;gap:10px;padding:3px 0;border-bottom:1px solid rgba(30,30,46,.5);align-items:flex-start}
.log-time{color:var(--text3);min-width:56px;flex-shrink:0}
.log-agent{min-width:80px;flex-shrink:0;font-weight:600}
.log-model{color:var(--text3);min-width:72px;flex-shrink:0}
.log-text{color:var(--text2)}
.log-sql{color:var(--blue)}
.log-analyst{color:var(--amber)}
.log-narrator{color:var(--violet)}
.log-watchdog{color:var(--green)}
.log-orch{color:var(--text2)}

/* Rail */
.rail-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.rail-title{font-size:12px;font-weight:600;color:var(--text)}
.rail-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.scan-line{height:2px;background:linear-gradient(90deg,transparent,var(--amber),transparent);animation:scan 2.4s linear infinite;margin-top:10px}

.rail-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.rail-kpi-label{font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:3px}
.rail-kpi-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Syne',sans-serif}
.tab:hover{color:var(--text)}
.tab.active{color:var(--amber2);border-bottom-color:var(--amber)}

/* Filters */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.filter-btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text3);transition:all .15s;font-family:'Syne',sans-serif}
.filter-btn:hover{color:var(--text);border-color:var(--border2)}
.filter-btn.active{background:var(--amber3);color:var(--amber2);border-color:rgba(212,168,64,.3)}

/* Ask */
.ask-input-wrap{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 16px;margin-bottom:16px;transition:border-color .15s}
.ask-input-wrap:focus-within{border-color:rgba(212,168,64,.4)}
.ask-input{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--text);font-family:'Syne',sans-serif}
.ask-input::placeholder{color:var(--text3)}
.answer-box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:18px;font-size:13px;line-height:1.7;color:var(--text2);margin-top:12px}
.answer-header{font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--amber);margin-bottom:10px}

/* Expander */
.expander{background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:8px}
.expander-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s}
.expander-header:hover{background:var(--bg3)}
.expander-body{padding:14px 16px;border-top:1px solid var(--border)}

/* Section title */
.section-title{font-size:11px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:14px}

/* Animations */
@keyframes slide-in{from{transform:translateY(-4px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-in{animation:slide-in .25s ease-out}

/* Progress */
.progress-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--amber),var(--orange))}

/* Divider */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* Metric grid */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}
.metric-box{background:var(--bg3);border-radius:7px;padding:12px 14px;border:1px solid var(--border)}
.metric-label{font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:4px}
.metric-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}

/* Self-correction */
.code-block{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;overflow-x:auto;margin:6px 0}
.code-fail{border-color:rgba(224,80,96,.3);background:rgba(224,80,96,.04)}
.code-ok{border-color:rgba(48,176,112,.3);background:rgba(48,176,112,.04)}
.code-error{color:var(--red);font-size:11px;font-family:'JetBrains Mono',monospace;padding:6px 0}
.code-success{color:var(--green);font-size:11px;font-family:'JetBrains Mono',monospace;padding:6px 0}
</style>
</head>

  );
};

/* ── VIEW: ASK ───────────────────────────────────────────── */
const AskView = ({ findings }) => {
  const [q, setQ] = useState('');
  const [answer, setAnswer] = useState(null);
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);

  const PRESETS = [
    'How do you prove IBM is locked in?',
    'Are your figures reliable?',
    'What can the government do about Microsoft?',
    'Why both Alberta AND federal data?',
    'What is the most critical finding?',
    'Explain fictitious competition at CAMH',
  ];

  const submit = async () => {
    if (!q.trim()) return;
    setLoading(true);
    setAnswer(null);

    try {
      const result = await apiFetch('/ask', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({question: q})
      });

      if (result && result.answer) {
        const entry = {q, answer: result.answer, time: now8()};
        setAnswer(entry);
        setHistory(h=>[entry,...h].slice(0,5));
      } else {
        throw new Error('no answer');
      }
    } catch(e) {
      const fallback = JUDGE_ANSWERS[q] || 'VendorWatch findings confirm significant structural concentration. Refer to the Findings Detail page for full evidence.';
      const entry = {q, answer: fallback, time: now8(), fallback: true};
      setAnswer(entry);
      setHistory(h=>[entry,...h].slice(0,5));
    }
    setLoading(false);
  };

  return (
    <div className="content" style={{maxWidth:800}}>
      <div style={{marginBottom:20}}>
        <h1 className="serif" style={{fontSize:28,fontWeight:600,letterSpacing:'-.02em'}}>Ask VendorWatch</h1>
        <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>Free-form questions · cited answers backed by findings store</div>
      </div>

      {/* Input */}
      <div className="ask-input-wrap">
        <span style={{fontSize:16,color:'var(--amber)'}}>◎</span>
        <input
          className="ask-input"
          value={q}
          onChange={e=>setQ(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter')submit()}}
          placeholder="Ask anything about vendor concentration, lock-in, or bi-governmental networks..."
        />
        <button className="btn btn-amber" onClick={submit} disabled={loading}>
          {loading ? '⟳ Thinking…' : 'Ask →'}
        </button>
      </div>

      {/* Presets */}
      <div style={{marginBottom:20}}>
        <div className="section-title" style={{marginBottom:8}}>Pre-rehearsed judge questions</div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
          {PRESETS.map(p=>(
            <button key={p} onClick={()=>{setQ(p)}}
              style={{padding:'6px 12px',borderRadius:6,background:'var(--bg2)',border:'1px solid var(--border)',color:'var(--text2)',fontSize:11,cursor:'pointer',transition:'all .15s',fontFamily:'Syne,sans-serif'}}
              onMouseOver={e=>{e.target.style.borderColor='var(--border2)';e.target.style.color='var(--text)'}}
              onMouseOut={e=>{e.target.style.borderColor='var(--border)';e.target.style.color='var(--text2)'}}>
              {p}
            </button>
          ))}
        </div>
      </div>

      {/* Answer */}
      {loading && (
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:9,padding:'20px 18px',textAlign:'center',color:'var(--text3)',fontSize:12,fontFamily:'JetBrains Mono'}}>
          <div className="live-dot" style={{display:'inline-block',marginRight:8}}></div>
          Agent is analyzing findings store…
        </div>
      )}
      {answer && !loading && (
        <div className="answer-box">
          <div className="answer-header">VendorWatch{answer.fallback ? ' · cached answer' : ' · live Bedrock response'}</div>
          <div style={{fontSize:14,color:'var(--text)',lineHeight:1.7}}>{answer.answer}</div>
          <div style={{marginTop:10,fontSize:10,fontFamily:'JetBrains Mono',color:'var(--text3)'}}>
            {answer.time} · {findings.length} findings in store
          </div>
        </div>
      )}

      {/* History */}
      {history.length > 1 && (
        <div style={{marginTop:20}}>
          <div className="section-title">Previous Q&A</div>
          {history.slice(1).map((item,i)=>(
            <div key={i} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 16px',marginBottom:8,fontSize:12}}>
              <div style={{color:'var(--text3)',fontFamily:'JetBrains Mono',fontSize:10,marginBottom:5}}>{item.time} · {item.q}</div>
              <div style={{color:'var(--text2)',lineHeight:1.6}}>{item.answer}</div>
            </div>
          ))}
        </div>
      )}

      <hr className="divider" style={{marginTop:24}} />
      <div className="section-title">Rehearsed answers for judges</div>
      {[
        ['How do you prove it\'s a problem?',
         'IBM: the contract says "extension past January 2019" — that\'s in the data. CAMH: 9 of the same people sit on both boards — that\'s in T3010 ARC filings.'],
        ['Are your figures reliable?',
         'All data is open and verifiable. We present correlations, not proven causalities — and we say so explicitly.'],
        ['What can the government do?',
         'IBM: mandatory RFP before 2030 renewal. Microsoft: audit the EA signed April 2025. CAMH/Boréal: combined cap per legally-linked entity.'],
        ['Why Alberta AND federal?',
         'Because neither government can see the full picture alone. VendorWatch is the first tool that crosses both.'],
      ].map(([qText,aText])=>(
        <div className="expander" key={qText} style={{marginBottom:7}}>
          {(()=>{
            const [open,setOpen] = useState(false);
            return <>
              <div className="expander-header" onClick={()=>setOpen(!open)}>
                <span style={{fontSize:12,fontWeight:600}}>❓ {qText}</span>
                <span style={{fontSize:10,color:'var(--text3)'}}>{open?'▲':'▼'}</span>
              </div>
              {open && <div className="expander-body" style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>→ {aText}</div>}
            </>;
          })()}
        </div>
      ))}
    </div>
  );
};

/* ── APP ─────────────────────────────────────────────────── */
const App = () => {
  const [view, setView] = useState('watchlist');
  const [findings, setFindings] = useState(FALLBACK_FINDINGS);
  const [summary, setSummary] = useState(null);
  const [busy, setBusy] = useState(false);
  const [watchdog, setWatchdog] = useState('IDLE');
  const [scanned, setScanned] = useState(2184217);
  const [activity, setActivity] = useState(() =>
    AGENT_TASKS.slice(0,10).map((t,i)=>({
      id: Date.now()-i*8000,
      time: new Date(Date.now()-i*8000).toTimeString().slice(0,8),
      agent:t[0], model:t[1], text:t[2]
    }))
  );

  // Load real data
  useEffect(()=>{
    apiFetch('/findings').then(d=>{ if(d&&d.length) setFindings(d); });
    apiFetch('/summary').then(d=>{ if(d) setSummary(d); });
  },[]);

  // Live activity ticker
  useEffect(()=>{
    const interval = setInterval(()=>{
      const t = AGENT_TASKS[Math.floor(Math.random()*AGENT_TASKS.length)];
      setActivity(prev=>[{id:Date.now(),time:now8(),agent:t[0],model:t[1],text:t[2]},...prev].slice(0,40));
      setScanned(c=>c+Math.floor(Math.random()*15));
    },2500);
    return ()=>clearInterval(interval);
  },[]);

  const handleSimulate = async () => {
    if(busy) return;
    setBusy(true);
    setWatchdog('ALERT');
    const addLog = (agent,model,text) => setActivity(p=>[{id:Date.now(),time:now8(),agent,model,text},...p].slice(0,40));
    setTimeout(()=>addLog('Watchdog','Haiku 4.5','⚠ delta detected · ab.ab_sole_source · +1 row · signaling refresh'),800);
    setTimeout(()=>addLog('Orchestrator','Opus 4.6','wake_on_watchdog_signal() · cycle restarted'),2000);
    setTimeout(()=>addLog('Analyst','Opus 4.6','compute_hhi · detect_lockin · find_adverse_signals…'),3400);
    setTimeout(()=>{
      addLog('Narrator','Sonnet 4.6','generate_alert_card · IBM Canada · ✅ fiche drafted');
      setWatchdog('IDLE');
      setBusy(false);
    },5200);
  };

  return (
    <div className="shell">
      <Sidebar view={view} setView={setView} />
      <div className="main">
        <header className="topbar">
          <input className="topbar-search" placeholder="Search vendor, BN, or finding…" />
          <div style={{flex:1}}></div>
          <div className="live-badge"><div className="live-dot"></div>LIVE</div>
          <button className="btn btn-ghost" style={{marginLeft:8}}>↓ Export</button>
        </header>
        <div style={{flex:1,overflow:'hidden',display:'flex'}}>
          <div style={{flex:1,overflow:'hidden'}}>
            {view==='watchlist' && <WatchlistView findings={findings} summary={summary} onSimulate={handleSimulate} busy={busy} activity={activity} scanned={scanned}/>}
            {view==='console'   && <ConsoleView activity={activity} scanned={scanned}/>}
            {view==='findings'  && <FindingsView findings={findings}/>}
            {view==='ask'       && <AskView findings={findings}/>}
          </div>
          <AgentRail activity={activity.slice(0,16)} scanned={scanned} findingsCount={findings.length} watchdog={watchdog}/>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
